  <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox__btn lightbox__close" type="button" aria-label="Close">×</button>
    <button class="lightbox__btn lightbox__prev" type="button" aria-label="Previous photo">‹</button>
    <img class="lightbox__img" alt="">
    <button class="lightbox__btn lightbox__next" type="button" aria-label="Next photo">›</button>
    <div class="lightbox__counter" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      var gallery = document.getElementById('cohort-gallery');
      var lb = document.getElementById('lightbox');
      if (!gallery || !lb) return;
      var items = Array.prototype.slice.call(gallery.querySelectorAll('a'));
      var img = lb.querySelector('.lightbox__img');
      var counter = lb.querySelector('.lightbox__counter');
      var idx = 0;

      function show(i) {
        idx = (i + items.length) % items.length;
        var a = items[idx];
        img.src = a.getAttribute('href');
        img.alt = a.querySelector('img').alt;
        counter.textContent = (idx + 1) + ' / ' + items.length;
        lb.hidden = false;
        document.body.style.overflow = 'hidden';
      }
      function hide() {
        lb.hidden = true;
        img.removeAttribute('src');
        document.body.style.overflow = '';
      }

      items.forEach(function (a, i) {
        a.addEventListener('click', function (e) { e.preventDefault(); show(i); });
      });
      lb.addEventListener('click', function (e) {
        if (e.target === lb) hide();
      });
      lb.querySelector('.lightbox__close').addEventListener('click', hide);
      lb.querySelector('.lightbox__prev').addEventListener('click', function () { show(idx - 1); });
      lb.querySelector('.lightbox__next').addEventListener('click', function () { show(idx + 1); });
      document.addEventListener('keydown', function (e) {
        if (lb.hidden) return;
        if (e.key === 'Escape') hide();
        else if (e.key === 'ArrowLeft') show(idx - 1);
        else if (e.key === 'ArrowRight') show(idx + 1);
      });
    })();
  </script>
